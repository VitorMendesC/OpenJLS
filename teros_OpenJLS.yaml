hooks:
  pre_build: []
  post_build: []
  pre_run: []
  post_run: []
watchers: []
configuration:
  general:
    general:
      pypath: ''
      makepath: ''
      go_to_definition_vhdl: true
      go_to_definition_verilog: true
      developer_mode: false
  documentation:
    general:
      language: english
      symbol_vhdl: '!'
      symbol_verilog: '!'
      dependency_graph: true
      self_contained: true
      fsm: true
      ports: all
      generics: all
      instantiations: all
      signals: all
      constants: all
      types: all
      process: all
      functions: all
      tasks: all
      magic_config_path: ''
  editor:
    general:
      stutter_comment_shortcuts: false
      stutter_block_width: 80
      stutter_max_width: 0
      stutter_delimiters: false
      stutter_bracket_shortcuts: false
  formatter:
    general:
      formatter_verilog: istyle
      formatter_vhdl: standalone
    istyle:
      style: ansi
      indentation_size: 2
    s3sv:
      one_bind_per_line: false
      one_declaration_per_line: false
      use_tabs: false
      indentation_size: 2
    verible:
      format_args: ''
    standalone:
      keyword_case: lowercase
      name_case: lowercase
      indentation: '  '
      align_port_generic: true
      align_comment: false
      remove_comments: false
      remove_reports: false
      check_alias: false
      new_line_after_then: new_line
      new_line_after_semicolon: new_line
      new_line_after_else: new_line
      new_line_after_port: new_line
      new_line_after_generic: new_line
    svg:
      configuration: ''
      core_number: 2
      aditional_arguments: ''
  linter:
    general:
      linter_vhdl: none
      linter_verilog: modelsim
      lstyle_verilog: disabled
      lstyle_vhdl: disabled
    vhdlls:
      standard: v2008
      ignoreVunit: false
      vunitPath: ''
    ghdl:
      arguments: ''
    icarus:
      arguments: ''
    modelsim:
      vhdl_arguments: ''
      verilog_arguments: ''
    verible:
      arguments: ''
    verilator:
      arguments: ''
    vivado:
      vhdl_arguments: ''
      verilog_arguments: ''
    vsg:
      arguments: ''
  schematic:
    general:
      backend: yowasp
      extra: ''
      args: ''
      args_ghdl: ''
  templates:
    general:
      header_file_path: ''
      indent: '  '
      clock_generation_style: inline
      instance_style: inline
  tools:
    general:
      select_tool: ghdl
      manual_compilation_order: ''
      execution_mode: cmd
      waveform_viewer: tool
      gtkwave_installation_path: ''
      gtkwave_extra_arguments: ''
    quartus:
      installation_path: ''
      family: ''
      device: ''
      optimization_mode: BALANCED
      allow_register_retiming: true
      wave_file_questa: ''
